name: tax_code_flutter
description: "App for Italian Tax Code calculation."
publish_to: none
version: 1.7.0+48

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # Local module
  shared:
    path: ../shared

  # Core & Utilities
  cloud_firestore: ^6.0.0
  firebase_auth: ^6.0.1
  firebase_core: ^4.0.0
  google_sign_in: ^6.3.0
  hive_ce_flutter: ^2.3.0
  intl: ^0.20.0
  logger: ^2.6.0
  provider: ^6.1.0
  shared_preferences: ^2.2.3
  uuid: ^4.4.0

  # UI & Widgets (Mobile specific)
  animated_reorderable_list: ^1.1.1
  barcode_widget: ^2.0.4
  flutter_widget_from_html: ^0.17.0
  material_symbols_icons: ^4.2788.0
  reactive_date_time_picker: ^5.0.1
  reactive_forms: ^18.1.1
  reactive_raw_autocomplete: ^2.1.1

  # Platform Plugins (Mobile specific)
  camera: ^0.12.0
  package_info_plus: ^9.0.0
  permission_handler: ^12.0.1
  screen_brightness: ^2.1.0
  share_plus: ^12.0.1
  url_launcher: ^6.3.0

  # Firebase (Mobile specific UI/Services)
  cloud_functions: ^6.0.1
  firebase_app_check: ^0.4.0
  firebase_crashlytics: ^5.0.0
  firebase_remote_config: ^6.0.0
  firebase_storage: ^13.1.0
  firebase_ui_auth: ^3.0.1
  firebase_ui_localizations: ^2.0.0
  firebase_ui_oauth_google: ^2.0.1
  in_app_review: ^2.0.11
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  camera_platform_interface: ^2.10.0
  firebase_auth_mocks: ^0.15.0
  firebase_core_platform_interface: ^6.0.0
  mocktail: ^1.0.4
  network_image_mock: ^2.1.1
  package_info_plus_platform_interface: ^3.2.1
  plugin_platform_interface: ^2.1.8
  remove_unused_localizations: ^1.1.2
  very_good_analysis: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/html/en/terms.html
    - assets/html/it/terms.html
    - assets/images/app_icon_512x512.png
